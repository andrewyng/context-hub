name: Update Lark Content

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  update-lark-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Regenerate Lark content
        run: npm run update:lark-content

      - name: Validate generated content
        run: node cli/bin/chub build content --validate-only

      - name: Commit updated Lark content
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No content changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/lark docs/lark-content.md cli/src/lib/lark-content.js scripts/update-lark-content.mjs package.json
          git commit -m "chore: update lark content"
          git push origin HEAD:main
